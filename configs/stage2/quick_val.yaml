# Stage 2 quick test on val data
experiment:
  name: "stage2_quick_val"

data:
  bridge_dir: output/bridge_val/
  shared_dir: /home/foods/pro/FMT-SimGen/output/shared
  samples_dir: /home/foods/pro/FMT-SimGen/data/uniform_1000_v2/samples
  train_split: /home/foods/pro/FMT-SimGen/data/uniform_1000_v2/splits/val.txt
  val_split: /home/foods/pro/FMT-SimGen/data/uniform_1000_v2/splits/val.txt
  n_query_points: 2048
  roi_padding_mm: 1.0

model:
  n_freqs: 10
  hidden_dim: 256
  n_hidden_layers: 4
  prior_dim: 8
  skip_connection: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 8
  max_epochs: 30
  grad_clip_norm: 1.0
  scheduler:
    type: "CosineAnnealingLR"
    T_max: 30
    eta_min: 1.0e-6
  early_stopping_patience: 10
  warmup_epochs: 2

loss:
  type: "mse"

logging:
  print_every: 1
