# DU2Vox Stage 2 — Multiview mode with 20k mesh
# DE + MCX 7-view fusion (ViewEncoderModule)
# Uses precomputed grid data + FMT-SimGen proj.npz

experiment:
  name: "full_multiview_20k"

data:
  precomputed_train_dir: precomputed/cqr_v1/train_smoke
  precomputed_val_dir: precomputed/cqr_v1/val_smoke
  train_bridge_dir: output/bridge_20k_train/
  val_bridge_dir: output/bridge_20k_val/

  samples_dir: /home/foods/pro/FMT-SimGen/data/uniform_1000_20k/samples
  shared_dir: /home/foods/pro/FMT-SimGen/output/shared_mesh_20k
  train_split: /home/foods/pro/FMT-SimGen/data/uniform_1000_20k/splits/train.txt
  val_split: /home/foods/pro/FMT-SimGen/data/uniform_1000_20k/splits/val.txt

  n_query_points: 4096
  roi_padding_mm: 1.0
  # precomputed_train_dir: precomputed/cqr_v1/train
  # precomputed_val_dir: precomputed/cqr_v1/val

model:
  model_type: cqr_residual_inr
  prior_dim: 13
  n_freqs: 10
  hidden_dim: 256
  n_hidden_layers: 4
  skip_connection: true
  view_encoder: true
  view_feat_dim: 32
  fusion_method: "attn"
  encoder_base_channels: 32
  encoder_out_channels: 32
  view_encoder_lr_scale: 1.0

training:
  lr: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 8
  max_epochs: 200
  grad_clip_norm: 1.0
  num_workers: 2
  scheduler:
    type: "CosineAnnealingLR"
    T_max: 200
    eta_min: 1.0e-6
  early_stopping_patience: 30
  warmup_epochs: 5

loss:
  type: "mse"

logging:
  print_every: 1
  detail_every: 5

cqr:
  ratios:
    core: 0.25
    halo: 0.45
    sentinel: 0.20
    bg: 0.10
  coverage:
    tau_core: 0.50
    tau_weak: 0.08
    halo_layers: 1
    sentinel_score_quantile: 0.85
