# Stage 2 smoke test for FIX v3 coordinate frame
experiment:
  name: "smoke_v3"

data:
  bridge_dir: output/bridge_smoke_v3/
  shared_dir: /home/foods/pro/FMT-SimGen/assets/mesh
  samples_dir: /home/foods/pro/FMT-SimGen/data/default/samples
  train_split: /home/foods/pro/FMT-SimGen/data/default/splits/train.txt
  val_split: /home/foods/pro/FMT-SimGen/data/default/splits/val.txt
  n_query_points: 2048
  roi_padding_mm: 1.0

model:
  n_freqs: 10
  hidden_dim: 256
  n_hidden_layers: 4
  prior_dim: 8
  skip_connection: true

training:
  lr: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 4
  max_epochs: 5
  grad_clip_norm: 1.0

loss:
  type: "mse"

logging:
  print_every: 1
