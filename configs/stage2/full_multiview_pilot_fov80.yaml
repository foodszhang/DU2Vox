# DU2Vox Stage 2 — full_multiview pilot with FOV=80 projections
# 6 pilot samples + 2 val samples, 30 epochs

experiment:
  name: "full_multiview_pilot_fov80"

data:
  precomputed_train_dir: precomputed/train/
  precomputed_val_dir: precomputed/val/

  samples_dir: /home/foods/pro/FMT-SimGen/data/uniform_1000_v2/samples

  train_bridge_dir: output/bridge_train/
  val_bridge_dir: output/bridge_val/
  shared_dir: /home/foods/pro/FMT-SimGen/output/shared
  train_split: /tmp/pilot_fov80_splits/train.txt
  val_split: /tmp/pilot_fov80_splits/val.txt

  n_query_points: 4096
  roi_padding_mm: 1.0

model:
  n_freqs: 10
  hidden_dim: 256
  n_hidden_layers: 4
  prior_dim: 8
  skip_connection: true
  view_encoder: true
  view_feat_dim: 32
  fusion_method: "mean"
  encoder_base_channels: 32
  encoder_out_channels: 32
  view_encoder_lr_scale: 0.1

training:
  lr: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 4
  max_epochs: 30
  grad_clip_norm: 1.0
  num_workers: 0  # fork-safe DataLoader (not needed for 6 samples)
  scheduler:
    type: "CosineAnnealingLR"
    T_max: 30
    eta_min: 1.0e-6
  early_stopping_patience: 10
  warmup_epochs: 3

loss:
  type: "mse"

logging:
  print_every: 1
  detail_every: 5
