# Stage 1 Training Configuration for GCAIN (MS-GDUN) - 1000 samples
#
# Data is referenced via paths pointing to FMT-SimGen output directory.

model:
  name: GCAIN_full
  feat_dim: 6
  num_layer: 6
  # n_nodes and n_surface are auto-detected from mesh
  n_nodes: 11236
  n_surface: 7465
  k_neighbors: 32
  n_neighbors: 32

training:
  batch_size: 8
  lr: 0.0005
  max_epochs: 300
  scheduler: ReduceLROnPlateau
  scheduler_patience: 10
  weight_decay: 0.0001
  early_stopping:
    patience: 30
    monitor: val_dice_03

loss:
  tversky_weight: 0.7
  tversky_alpha: 0.1
  tversky_beta: 0.9
  mse_weight: 0.3

paths:
  checkpoint_dir: checkpoints
  # Point to FMT-SimGen output directory
  shared_dir: /home/foods/pro/FMT-SimGen/output/shared
  samples_dir: /home/foods/pro/FMT-SimGen/data/samples
  # Splits remain in FMT-SimGen train/splits directory
  splits_dir: /home/foods/pro/FMT-SimGen/train/splits
