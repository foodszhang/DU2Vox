# Stage 1 Training Configuration for GCAIN (MS-GDUN)
#
# Data is referenced via data_root pointing to FMT-SimGen output directory.
# Splits are NOT copied - they remain in FMT-SimGen output.

data:
  # Point to FMT-SimGen output directory
  data_root: /home/foods/pro/FMT-SimGen/output
  shared_dir: ${data.data_root}/shared
  samples_dir: ${data.data_root}/samples
  # Splits remain in FMT-SimGen train/splits directory
  splits_dir: /home/foods/pro/FMT-SimGen/train/splits

model:
  feat_dim: 6
  num_layer: 6
  # n_nodes and n_surface are auto-detected from mesh, these are overrides
  n_nodes: 11236
  n_surface: 7465
  k_neighbors: 32
  n_neighbors: 32

training:
  batch_size: 8
  lr: 0.0005
  max_epochs: 300
  scheduler: ReduceLROnPlateau
  scheduler_patience: 10
  weight_decay: 0.0001

paths:
  checkpoint_dir: checkpoints
